name: "党政机关公文"
description: "符合 GB/T 9704-2012《党政机关公文格式》国家标准（WPS 样式）"

page:
  width: 210
  height: 297
  margin_top: 37
  margin_bottom: 35
  margin_left: 28
  margin_right: 26
  header_distance: 15.0
  footer_distance: 17.5
  orientation: "portrait"

header:
  center: ""

footer:
  center: "{page_number}"
  font_name: "仿宋"
  font_size: 14

toc:
  enabled: false
  max_level: 3
  title: "目录"
  page_break_after: false

styles:
  Title:
    run:
      font_name: "方正小标宋简体"
      font_name_east_asia: "方正小标宋简体"
      font_size: 22
      bold: false
      color: "#000000"
    paragraph:
      alignment: "center"
      space_before: 0
      space_after: 20
      line_spacing: 1.5

  Heading 1:
    run:
      font_name: "黑体"
      font_name_east_asia: "黑体"
      font_size: 16
      bold: true
      color: "#000000"
    paragraph:
      alignment: "left"
      space_before: 12
      space_after: 6
      line_spacing: 1.5

  Heading 2:
    run:
      font_name: "楷体"
      font_name_east_asia: "楷体"
      font_size: 16
      bold: true
      color: "#000000"
    paragraph:
      alignment: "left"
      space_before: 8
      space_after: 4
      line_spacing: 1.5

  Heading 3:
    run:
      font_name: "仿宋"
      font_name_east_asia: "仿宋"
      font_size: 16
      bold: true
      color: "#000000"
    paragraph:
      alignment: "left"
      space_before: 6
      space_after: 4
      line_spacing: 1.5

  Heading 4:
    run:
      font_name: "仿宋"
      font_name_east_asia: "仿宋"
      font_size: 16
      color: "#000000"
    paragraph:
      alignment: "left"
      space_before: 6
      space_after: 4
      line_spacing: 1.5

  Normal:
    run:
      font_name: "仿宋"
      font_name_east_asia: "仿宋"
      font_size: 16
      color: "#000000"
    paragraph:
      alignment: "justify"
      line_spacing: 1.75
      first_line_indent_chars: 2
      space_before: 0
      space_after: 0

  BlockQuote:
    run:
      font_name: "楷体"
      font_name_east_asia: "楷体"
      font_size: 16
      color: "#000000"
    paragraph:
      alignment: "justify"
      left_indent: 32
      right_indent: 32
      line_spacing: 1.5

  Table:
    run:
      font_name: "仿宋"
      font_name_east_asia: "仿宋"
      font_size: 14
      color: "#000000"
    paragraph:
      alignment: "center"
      line_spacing: 1.25

  List:
    run:
      font_name: "仿宋"
      font_name_east_asia: "仿宋"
      font_size: 16
      color: "#000000"
    paragraph:
      alignment: "left"
      line_spacing: 1.5
      left_indent: 24

  Code:
    run:
      font_name: "Courier New"
      font_size: 12
      color: "#000000"
    paragraph:
      alignment: "left"
      left_indent: 24
      line_spacing: 1.15
