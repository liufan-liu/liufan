name: "通用文档"
description: "默认通用模板，适用于一般文档、笔记、说明书等"

page:
  width: 210
  height: 297
  margin_top: 25.4
  margin_bottom: 25.4
  margin_left: 31.8
  margin_right: 31.8
  header_distance: 15.0
  footer_distance: 17.5
  orientation: "portrait"

header:
  center: ""

footer:
  center: "{page_number}"
  font_name: "Times New Roman"
  font_size: 9

toc:
  enabled: false
  max_level: 3
  title: "目录"
  page_break_after: false

styles:
  Title:
    run:
      font_name: "黑体"
      font_name_east_asia: "黑体"
      font_size: 22
      bold: true
      color: "#000000"
    paragraph:
      alignment: "center"
      space_before: 24
      space_after: 18
      line_spacing: 1.5

  Heading 1:
    run:
      font_name: "黑体"
      font_name_east_asia: "黑体"
      font_size: 22
      bold: true
      color: "#000000"
    paragraph:
      alignment: "center"
      space_before: 24
      space_after: 18
      line_spacing: 1.5

  Heading 2:
    run:
      font_name: "黑体"
      font_name_east_asia: "黑体"
      font_size: 15
      bold: true
    paragraph:
      alignment: "left"
      space_before: 13
      space_after: 7
      line_spacing: 1.5

  Heading 3:
    run:
      font_name: "黑体"
      font_name_east_asia: "黑体"
      font_size: 13
      bold: true
    paragraph:
      alignment: "left"
      space_before: 12
      space_after: 6
      line_spacing: 1.5

  Heading 4:
    run:
      font_name: "黑体"
      font_name_east_asia: "黑体"
      font_size: 12
      bold: true
    paragraph:
      alignment: "left"
      space_before: 6
      space_after: 6
      line_spacing: 1.5

  Normal:
    run:
      font_name: "宋体"
      font_name_east_asia: "宋体"
      font_size: 12
    paragraph:
      alignment: "justify"
      line_spacing: 1.5
      first_line_indent_chars: 2
      space_before: 0
      space_after: 0

  BlockQuote:
    run:
      font_name: "楷体"
      font_name_east_asia: "楷体"
      font_size: 10.5
      italic: true
    paragraph:
      alignment: "justify"
      left_indent: 36
      right_indent: 36
      line_spacing: 1.25

  Code:
    run:
      font_name: "Courier New"
      font_size: 10
    paragraph:
      alignment: "left"
      left_indent: 24
      line_spacing: 1.15
      space_before: 6
      space_after: 6

  Table:
    run:
      font_name: "宋体"
      font_name_east_asia: "宋体"
      font_size: 10.5
    paragraph:
      alignment: "center"
      line_spacing: 1.15

  List:
    run:
      font_name: "宋体"
      font_name_east_asia: "宋体"
      font_size: 12
    paragraph:
      alignment: "left"
      line_spacing: 1.5
      left_indent: 24
      first_line_indent_chars: 0
